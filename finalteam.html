<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Final Project Team Hub | Shared Collaboration Workspace</title>
  <style>
    :root {
      --bg: #0b1020;
      --bg-soft: #131a2e;
      --panel: rgba(255, 255, 255, 0.08);
      --panel-strong: rgba(255, 255, 255, 0.12);
      --border: rgba(255, 255, 255, 0.14);
      --text: #f8fafc;
      --muted: #cbd5e1;
      --accent: #7c3aed;
      --accent-2: #06b6d4;
      --success: #22c55e;
      --warning: #f59e0b;
      --danger: #ef4444;
      --shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      --radius: 22px;
      --radius-sm: 14px;
      --max: 1280px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: Inter, Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(124, 58, 237, 0.35), transparent 30%),
        radial-gradient(circle at top right, rgba(6, 182, 212, 0.25), transparent 28%),
        linear-gradient(180deg, #0b1020 0%, #0f172a 42%, #111827 100%);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.55;
    }

    a { color: inherit; text-decoration: none; }
    img { max-width: 100%; display: block; }

    .container {
      width: min(100% - 2rem, var(--max));
      margin: 0 auto;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 1000;
      backdrop-filter: blur(18px);
      background: rgba(11, 16, 32, 0.72);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }

    .topbar-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.85rem 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      min-width: 0;
    }

    .brand-badge {
      width: 46px;
      height: 46px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-weight: 800;
      letter-spacing: 0.04em;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: var(--shadow);
      flex-shrink: 0;
    }

    .brand-text h1 {
      margin: 0;
      font-size: 1rem;
      line-height: 1.2;
    }

    .brand-text p {
      margin: 0.15rem 0 0;
      color: var(--muted);
      font-size: 0.86rem;
    }

    .nav {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      padding: 0.65rem 0.9rem;
      border-radius: 999px;
      color: var(--muted);
      transition: 0.25s ease;
      font-size: 0.95rem;
    }

    .nav a:hover,
    .nav a:focus-visible {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      outline: none;
    }

    .hero {
      padding: 3.2rem 0 1.6rem;
    }

    .hero-grid {
      display: grid;
      grid-template-columns: 1.35fr 0.95fr;
      gap: 1.5rem;
      align-items: stretch;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
    }

    .hero-card {
      padding: 2rem;
      position: relative;
      overflow: hidden;
    }

    .hero-card::before {
      content: "";
      position: absolute;
      inset: auto -60px -70px auto;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,58,237,0.45), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.75rem;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 999px;
      color: #e9d5ff;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      margin-bottom: 1rem;
    }

    .hero h2 {
      margin: 0;
      font-size: clamp(2rem, 4vw, 3.5rem);
      line-height: 1.05;
      max-width: 12ch;
    }

    .hero p.lead {
      color: var(--muted);
      font-size: 1.06rem;
      max-width: 64ch;
      margin: 1rem 0 1.5rem;
    }

    .hero-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.85rem;
      margin-bottom: 1.5rem;
    }

    .btn {
      border: none;
      border-radius: 999px;
      padding: 0.95rem 1.2rem;
      font-size: 0.98rem;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.2s ease, opacity 0.2s ease, background 0.2s ease;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .btn-primary {
      color: white;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      box-shadow: 0 14px 25px rgba(124,58,237,0.28);
    }

    .btn-secondary {
      color: var(--text);
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
    }

    .hero-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 0.6rem;
    }

    .tag {
      padding: 0.5rem 0.7rem;
      border-radius: 999px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
      color: var(--muted);
      font-size: 0.88rem;
    }

    .countdown-card {
      padding: 1.4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      justify-content: space-between;
    }

    .countdown-header h3,
    .section-title h3,
    .mini-title { margin: 0; }

    .countdown-header p,
    .section-title p,
    .muted { color: var(--muted); }

    .due-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.7rem;
      border-radius: 999px;
      background: rgba(245, 158, 11, 0.12);
      border: 1px solid rgba(245, 158, 11, 0.22);
      color: #fde68a;
      font-weight: 700;
      font-size: 0.87rem;
      width: fit-content;
    }

    .count-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0.8rem;
    }

    .time-box {
      padding: 1rem 0.6rem;
      border-radius: 18px;
      text-align: center;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .time-box strong {
      display: block;
      font-size: clamp(1.4rem, 3vw, 2.1rem);
      line-height: 1;
      margin-bottom: 0.3rem;
    }

    .time-box span {
      font-size: 0.8rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .status-banner {
      padding: 0.95rem 1rem;
      border-radius: 16px;
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #bbf7d0;
      font-weight: 600;
    }

    main { padding-bottom: 4rem; }

    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 1.2rem
